# =============================================================================
# Nginx Site Configuration - Summit Commercial Construction Website
# Static site serving with caching and security optimizations
# =============================================================================

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    
    # -------------------------------------------------------------------------
    # Security
    # -------------------------------------------------------------------------
    # Hide nginx version
    server_tokens off;
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to backup/config files
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # -------------------------------------------------------------------------
    # Health Check Endpoint
    # -------------------------------------------------------------------------
    location /healthz {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # -------------------------------------------------------------------------
    # Static Assets - Aggressive Caching
    # -------------------------------------------------------------------------
    # Images, fonts, media files
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|otf|eot|mp4|webm|ogg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        
        # Try to serve file, fall back to 404
        try_files $uri =404;
    }
    
    # CSS and JavaScript files
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        
        # Try to serve file, fall back to 404
        try_files $uri =404;
    }
    
    # -------------------------------------------------------------------------
    # Main Application - Single Page Application (SPA) Handling
    # -------------------------------------------------------------------------
    location / {
        # Apply rate limiting
        limit_req zone=general burst=20 nodelay;
        
        # Try to serve file, then directory, then fall back to index.html
        try_files $uri $uri/ /index.html;
        
        # Cache control for HTML (short cache for SPA)
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # -------------------------------------------------------------------------
    # API Proxy (Future API endpoint)
    # Uncomment when backend API is implemented
    # -------------------------------------------------------------------------
    # location /api/ {
    #     limit_req zone=general burst=10 nodelay;
    #     
    #     proxy_pass http://api:3000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    #     proxy_read_timeout 86400;
    # }
    
    # -------------------------------------------------------------------------
    # Contact Form Endpoint (Rate Limited)
    # -------------------------------------------------------------------------
    location /api/contact {
        # Strict rate limiting for contact form
        limit_req zone=contact burst=3 nodelay;
        
        # Return 503 if rate limit exceeded
        limit_req_status 503;
        
        # For now, return success (implement actual backend later)
        add_header Content-Type application/json;
        return 200 '{"success":true,"message":"Form submission simulated"}';
    }
    
    # -------------------------------------------------------------------------
    # Error Pages
    # -------------------------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/site-access.log main;
    error_log /var/log/nginx/site-error.log warn;
}

